<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{name}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: {{primary}};
      --bg: {{background}};
      --text: {{text}};
      --font: {{font}};
      --fontHeading: {{fontHeading}};
    }
    body { font-family: var(--font), serif; background: var(--bg); color: var(--text); margin: 0; }
    * { box-sizing: border-box; }
    h1, h2, h3 { font-family: var(--fontHeading), serif; }
  </style>
</head>
<body>
  <!-- SECTIONS -->
</body>
</html>
