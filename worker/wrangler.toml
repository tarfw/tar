name = "tar-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Secrets are set via: npx wrangler secret put JWT_SECRET
# Do NOT put secrets in [vars] - they would be visible in plaintext

[[durable_objects.bindings]]
name = "SYNC_DO"
class_name = "TarDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TarDO"]
